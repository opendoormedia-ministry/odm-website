<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — The Open Door</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .adm-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--sp-5); height: 56px;
      background: rgba(10,6,2,.94); border-bottom: 1px solid var(--hub-border);
      backdrop-filter: blur(8px);
    }
    .adm-header__brand {
      font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
    }
    .adm-header__brand span { color: var(--hub-lo); }
    .adm-btn-ghost {
      background: none; border: 1px solid var(--hub-border); border-radius: 6px;
      padding: 6px 14px; font-family: 'Montserrat', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--hub-lo); cursor: pointer; transition: color .2s, border-color .2s;
    }
    .adm-btn-ghost:hover { color: var(--hub-hi); border-color: var(--hub-mid); }

    /* Login */
    .adm-login {
      position: relative; z-index: 1; min-height: calc(100vh - 56px);
      display: flex; align-items: center; justify-content: center;
      padding: var(--sp-8) var(--sp-5);
    }
    .adm-login__card {
      width: 100%; max-width: 420px;
      background: rgba(197,88,51,.05); border: 1px solid var(--hub-border);
      border-radius: 16px; padding: 40px 36px;
    }
    .adm-login__eyebrow {
      font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
      margin-bottom: 10px;
    }
    .adm-login__heading { color: var(--hub-hi); font-size: 24px; margin-bottom: 28px; line-height: 1.2; }
    .adm-field { margin-bottom: 16px; }
    .adm-label {
      display: block; font-family: 'Montserrat', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--hub-lo); margin-bottom: 6px;
    }
    .adm-input {
      width: 100%; background: rgba(15,9,4,.6); border: 1px solid var(--hub-border);
      border-radius: 8px; padding: 10px 14px; color: var(--hub-hi);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      transition: border-color .2s; box-sizing: border-box;
    }
    .adm-input:focus { outline: none; border-color: var(--accent); }
    .adm-input::placeholder { color: var(--hub-lo); }
    .adm-login__submit {
      width: 100%; margin-top: 8px; padding: 13px;
      background: var(--accent); border: none; border-radius: 8px;
      font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--paper);
      cursor: pointer; transition: opacity .2s;
    }
    .adm-login__submit:hover { opacity: .85; }
    .adm-login__submit:disabled { opacity: .4; cursor: not-allowed; }
    .adm-error {
      margin-top: 14px; padding: 10px 14px;
      background: rgba(180,40,40,.1); border: 1px solid rgba(180,40,40,.3);
      border-radius: 8px; font-size: 13px; color: #f08080;
    }
    .adm-login__note {
      margin-top: 20px; font-size: 12px; color: var(--hub-lo);
      line-height: 1.6; text-align: center;
    }
    .adm-login__note a { color: var(--accent); }

    /* App shell */
    .adm-app {
      position: relative; z-index: 1; min-height: calc(100vh - 56px);
      max-width: 820px; margin: 0 auto;
      padding: var(--sp-6) var(--sp-5) var(--sp-12);
    }

    /* Toolbar */
    .adm-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--sp-5); gap: 12px; flex-wrap: wrap;
    }
    .adm-tabs { display: flex; gap: 4px; }
    .adm-tab {
      background: none; border: 1px solid var(--hub-border); border-radius: 20px;
      padding: 6px 16px; font-family: 'Montserrat', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--hub-lo); cursor: pointer; transition: all .2s;
    }
    .adm-tab:hover { color: var(--hub-hi); border-color: var(--hub-mid); }
    .adm-tab.is-active { background: var(--accent); border-color: var(--accent); color: var(--paper); }
    .adm-new-btn {
      background: none; border: 1px solid var(--accent); border-radius: 8px;
      padding: 8px 18px; font-family: 'Montserrat', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--accent); cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .adm-new-btn:hover { background: var(--accent); color: var(--paper); }

    /* Post cards */
    .adm-list { display: flex; flex-direction: column; gap: 10px; }
    .adm-post-card {
      display: flex; align-items: flex-start; gap: 16px;
      background: rgba(197,88,51,.05); border: 1px solid var(--hub-border);
      border-radius: 12px; padding: 20px 22px; cursor: pointer; transition: border-color .2s;
    }
    .adm-post-card:hover { border-color: rgba(197,88,51,.4); }
    .adm-post-card__body { flex: 1; min-width: 0; }
    .adm-post-card__meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .adm-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .adm-badge--draft { background: rgba(197,88,51,.12); color: var(--accent); border: 1px solid rgba(197,88,51,.3); }
    .adm-badge--pub { background: rgba(50,160,80,.12); color: #6dca8a; border: 1px solid rgba(50,160,80,.3); }
    .adm-post-card__date { font-size: 12px; color: var(--hub-lo); }
    .adm-post-card__title {
      color: var(--hub-hi); font-size: 17px; font-weight: 500; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .adm-post-card__sub { font-size: 13px; color: var(--hub-lo); }
    .adm-post-card__arrow { color: var(--hub-lo); font-size: 18px; align-self: center; flex-shrink: 0; }

    /* States */
    .adm-loading, .adm-empty { text-align: center; padding: var(--sp-10); color: var(--hub-lo); }
    .adm-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); margin: 0 3px; animation: adm-pulse 1s ease-in-out infinite;
    }
    .adm-dot:nth-child(2) { animation-delay: .2s; }
    .adm-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes adm-pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* Editor */
    .adm-editor { display: flex; flex-direction: column; gap: 20px; }
    .adm-private-box {
      background: rgba(15,9,4,.5); border: 1px solid var(--hub-border); border-radius: 10px; overflow: hidden;
    }
    .adm-private-box__hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; cursor: pointer; user-select: none;
    }
    .adm-private-box__lbl {
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--hub-lo);
    }
    .adm-private-box__arrow { font-size: 11px; color: var(--hub-lo); transition: transform .2s; }
    .adm-private-box__arrow.open { transform: rotate(180deg); }
    .adm-private-box__bd { padding: 0 18px 18px; }
    .adm-priv-row {
      display: grid; grid-template-columns: 140px 1fr; gap: 8px 16px;
      align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .adm-priv-row:last-child { border-bottom: none; }
    .adm-priv-row__k {
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--hub-lo);
    }
    .adm-priv-row__v { font-size: 14px; color: var(--hub-mid); word-break: break-all; }
    .adm-public-box {
      background: rgba(197,88,51,.04); border: 1px solid var(--hub-border);
      border-radius: 10px; padding: 24px 22px;
    }
    .adm-public-box__lbl {
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px;
    }
    .adm-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    @media(max-width:540px){ .adm-row2 { grid-template-columns: 1fr; } }
    .adm-field-full { margin-bottom: 14px; }
    .adm-textarea {
      width: 100%; min-height: 260px; background: rgba(15,9,4,.6);
      border: 1px solid var(--hub-border); border-radius: 8px; padding: 14px;
      color: var(--hub-hi); font-family: 'DM Sans', sans-serif; font-size: 15px;
      line-height: 1.7; resize: vertical; transition: border-color .2s; box-sizing: border-box;
    }
    .adm-textarea:focus { outline: none; border-color: var(--accent); }
    .adm-textarea::placeholder { color: var(--hub-lo); }
    .adm-actions { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 4px; align-items: center; }
    .adm-btn-primary {
      padding: 12px 28px; background: var(--accent); border: none; border-radius: 8px;
      font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--paper);
      cursor: pointer; transition: opacity .2s;
    }
    .adm-btn-primary:hover { opacity: .85; }
    .adm-btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .adm-btn-secondary {
      padding: 12px 22px; background: none; border: 1px solid var(--hub-border);
      border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--hub-mid); cursor: pointer; transition: all .2s;
    }
    .adm-btn-secondary:hover { color: var(--hub-hi); border-color: var(--hub-mid); }
    .adm-btn-secondary:disabled { opacity: .4; cursor: not-allowed; }
    .adm-btn-danger {
      padding: 12px 22px; background: none; border: 1px solid rgba(180,40,40,.3);
      border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: #f08080; cursor: pointer; transition: all .2s; margin-left: auto;
    }
    .adm-btn-danger:hover { background: rgba(180,40,40,.1); border-color: rgba(180,40,40,.5); }

    /* Toast */
    .adm-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(50,160,80,.92); color: #fff; padding: 12px 24px;
      border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      opacity: 0; transition: all .3s; z-index: 100; pointer-events: none;
    }
    .adm-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .adm-toast.err  { background: rgba(180,40,40,.92); }
  </style>
</head>
<body class="hub-page">

  <div class="hub-lantern-layer" style="position:fixed;left:-60px;bottom:-80px;width:430px;height:430px;border-radius:50%;background:radial-gradient(closest-side,rgba(240,150,66,.28),rgba(207,90,40,.09),transparent 72%);filter:blur(16px);animation:odm-flicker 3.4s ease-in-out infinite;z-index:0;pointer-events:none;" aria-hidden="true"></div>
  <div style="position:fixed;inset:0;box-shadow:inset 0 0 170px 50px rgba(0,0,0,.62);pointer-events:none;z-index:0;" aria-hidden="true"></div>

  <header class="adm-header">
    <div class="adm-header__brand">The Open Door <span>· Admin</span></div>
    <button class="adm-btn-ghost" id="btn-logout" hidden>Sign Out</button>
  </header>

  <!-- Login -->
  <section class="adm-login" id="screen-login">
    <div class="adm-login__card">
      <div class="adm-login__eyebrow">Admin Access</div>
      <h1 class="adm-login__heading">Sign in to manage stories.</h1>
      <div class="adm-field">
        <label class="adm-label" for="in-owner">GitHub Username</label>
        <input class="adm-input" id="in-owner" type="text" placeholder="your-github-username" autocomplete="off" spellcheck="false">
      </div>
      <div class="adm-field">
        <label class="adm-label" for="in-repo">Repository Name</label>
        <input class="adm-input" id="in-repo" type="text" placeholder="odm-website" autocomplete="off" spellcheck="false">
      </div>
      <div class="adm-field">
        <label class="adm-label" for="in-token">Personal Access Token</label>
        <input class="adm-input" id="in-token" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
      </div>
      <button class="adm-login__submit" id="btn-login">Sign In →</button>
      <div class="adm-error" id="login-err" hidden></div>
      <p class="adm-login__note">
        Need a token? <a href="https://github.com/settings/tokens/new?description=ODM+Admin&scopes=repo" target="_blank" rel="noopener">Create one on GitHub →</a><br>
        Select the <strong>repo</strong> scope. Your credentials stay in this browser only.
      </p>
    </div>
  </section>

  <!-- App -->
  <div class="adm-app" id="screen-app" hidden>

    <div id="view-list">
      <div class="adm-toolbar">
        <div class="adm-tabs">
          <button class="adm-tab is-active" data-f="drafts">Drafts</button>
          <button class="adm-tab" data-f="published">Published</button>
          <button class="adm-tab" data-f="all">All</button>
        </div>
        <button class="adm-new-btn" id="btn-new">+ New Story</button>
      </div>
      <div class="adm-list" id="post-list"></div>
    </div>

    <div id="view-editor" hidden>
      <div class="adm-editor" id="ed"></div>
    </div>

  </div>

  <div class="adm-toast" id="toast"></div>

  <script>
  'use strict';

  const POSTS = 'the-open-door/posts';

  const S = { token: null, owner: null, repo: null, posts: [], filter: 'drafts' };

  const $login  = document.getElementById('screen-login');
  const $app    = document.getElementById('screen-app');
  const $vList  = document.getElementById('view-list');
  const $vEd    = document.getElementById('view-editor');
  const $ed     = document.getElementById('ed');
  const $list   = document.getElementById('post-list');
  const $logout = document.getElementById('btn-logout');
  const $toast  = document.getElementById('toast');

  // Toast
  let _tt;
  function toast(msg, err) {
    $toast.textContent = msg;
    $toast.className   = 'adm-toast' + (err ? ' err' : '');
    requestAnimationFrame(() => $toast.classList.add('show'));
    clearTimeout(_tt);
    _tt = setTimeout(() => $toast.classList.remove('show'), 3200);
  }

  // GitHub API
  async function gh(method, path, body) {
    const r = await fetch('https://api.github.com' + path, {
      method,
      headers: {
        'Authorization': 'Bearer ' + S.token,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json',
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + r.status); }
    return r.json();
  }

  // Encoding
  function b64dec(b64) {
    const bin = atob(b64.replace(/\s/g, ''));
    const b = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(b);
  }
  function b64enc(str) {
    const b = new TextEncoder().encode(str);
    let s = '';
    b.forEach(x => s += String.fromCharCode(x));
    return btoa(s);
  }

  // Frontmatter
  function parse(src) {
    const m = src.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if (!m) return { meta: {}, body: src.trim() };
    const meta = {};
    for (const ln of m[1].split('\n')) {
      const c = ln.indexOf(':');
      if (c < 0) continue;
      const k = ln.slice(0, c).trim();
      const v = ln.slice(c + 1).trim().replace(/^["']|["']$/g, '');
      if (k) meta[k] = v;
    }
    return { meta, body: m[2].trim() };
  }

  function build(meta, body) {
    const L = ['---',
      'title: '    + clean(meta.title),
      'author: '   + clean(meta.author),
      'date: '     + (meta.date || ''),
      'tagline: '  + clean(meta.tagline),
      'published: '+ (meta.published === 'true' || meta.published === true ? 'true' : 'false'),
    ];
    if (meta._private_fullname)    L.push('_private_fullname: '    + meta._private_fullname);
    if (meta._private_email)       L.push('_private_email: '       + meta._private_email);
    if (meta._private_contact)     L.push('_private_contact: '     + meta._private_contact);
    if (meta._private_publishperm) L.push('_private_publishperm: ' + meta._private_publishperm);
    L.push('---', '', body || '');
    return L.join('\n');
  }

  function clean(s) { return (s || '').replace(/\n/g, ' '); }
  function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function today()  { return new Date().toISOString().split('T')[0]; }
  function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d + 'T12:00:00');
    return isNaN(dt) ? d : dt.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  }

  // Load posts
  async function loadPosts() {
    $list.innerHTML = '<div class="adm-loading"><span class="adm-dot"></span><span class="adm-dot"></span><span class="adm-dot"></span></div>';
    try {
      let files;
      try {
        files = await gh('GET', '/repos/' + S.owner + '/' + S.repo + '/contents/' + POSTS);
      } catch (e) {
        if (e.message.includes('404') || e.message.includes('Not Found')) {
          S.posts = [];
          renderList();
          return;
        }
        throw e;
      }
      const md = Array.isArray(files) ? files.filter(f => f.name.endsWith('.md')) : [];
      const posts = await Promise.all(md.map(async f => {
        const file = await gh('GET', '/repos/' + S.owner + '/' + S.repo + '/contents/' + POSTS + '/' + f.name);
        const { meta, body } = parse(b64dec(file.content));
        return { filename: f.name, sha: file.sha, meta, body };
      }));
      posts.sort((a, b) => {
        if (!a.meta.date && !b.meta.date) return 0;
        if (!a.meta.date) return 1;
        if (!b.meta.date) return -1;
        return new Date(b.meta.date) - new Date(a.meta.date);
      });
      S.posts = posts;
      renderList();
    } catch (err) {
      $list.innerHTML = '<div class="adm-empty">Failed to load: ' + esc(err.message) + '</div>';
    }
  }

  // Render list
  function renderList() {
    const visible = S.posts.filter(p => {
      const pub = p.meta.published === 'true';
      if (S.filter === 'drafts')    return !pub;
      if (S.filter === 'published') return pub;
      return true;
    });
    if (!visible.length) {
      $list.innerHTML = '<div class="adm-empty">Nothing here yet.</div>';
      return;
    }
    $list.innerHTML = visible.map(p => {
      const pub  = p.meta.published === 'true';
      const badge = pub
        ? '<span class="adm-badge adm-badge--pub">Published</span>'
        : '<span class="adm-badge adm-badge--draft">Draft</span>';
      const title = p.meta.title ? esc(p.meta.title) : '<em style="color:var(--hub-lo)">Untitled</em>';
      const sub   = p.meta._private_fullname
        ? 'Submission from ' + esc(p.meta._private_fullname)
        : esc(p.meta.author || p.filename);
      const idx = S.posts.indexOf(p);
      return '<div class="adm-post-card" data-i="' + idx + '">'
        + '<div class="adm-post-card__body">'
        + '<div class="adm-post-card__meta">' + badge
        + (p.meta.date ? '<span class="adm-post-card__date">' + fmtDate(p.meta.date) + '</span>' : '')
        + '</div>'
        + '<div class="adm-post-card__title">' + title + '</div>'
        + '<div class="adm-post-card__sub">' + sub + '</div>'
        + '</div>'
        + '<div class="adm-post-card__arrow">›</div>'
        + '</div>';
    }).join('');
    $list.querySelectorAll('.adm-post-card').forEach(c => {
      c.addEventListener('click', () => openEditor(S.posts[+c.dataset.i]));
    });
  }

  // Editor
  function openEditor(post) {
    showView('ed');
    const isNew = !post;
    const p = post || { filename: '', sha: null, meta: {}, body: '' };
    const pub = p.meta.published === 'true';
    const hasPriv = p.meta._private_fullname || p.meta._private_email;

    $ed.innerHTML = [
      '<div><button class="hub-back-btn" id="btn-back">← Back to list</button></div>',

      hasPriv ? [
        '<div class="adm-private-box">',
          '<div class="adm-private-box__hd" id="priv-toggle">',
            '<span class="adm-private-box__lbl">Submission Details — private, never published</span>',
            '<span class="adm-private-box__arrow open" id="priv-arrow">▼</span>',
          '</div>',
          '<div class="adm-private-box__bd" id="priv-bd">',
            privRow('Submitted by', p.meta._private_fullname),
            privRow('Email',        p.meta._private_email),
            privRow('Contact pref.', p.meta._private_contact),
            privRow('Publish perm.', p.meta._private_publishperm),
          '</div>',
        '</div>',
      ].join('') : '',

      '<div class="adm-public-box">',
        '<div class="adm-public-box__lbl">Public Content</div>',
        '<div class="adm-field-full">',
          '<label class="adm-label" for="ef-title">Title</label>',
          '<input class="adm-input" id="ef-title" type="text" placeholder="Leave blank to fill in later" value="' + esc(p.meta.title || '') + '">',
        '</div>',
        '<div class="adm-row2">',
          '<div><label class="adm-label" for="ef-author">Author (full name — abbreviated automatically)</label>'
            + '<input class="adm-input" id="ef-author" type="text" placeholder="Sarah Miller" value="' + esc(p.meta.author || '') + '"></div>',
          '<div><label class="adm-label" for="ef-date">Date</label>'
            + '<input class="adm-input" id="ef-date" type="date" value="' + esc(p.meta.date || today()) + '"></div>',
        '</div>',
        '<div class="adm-field-full">',
          '<label class="adm-label" for="ef-tagline">Tagline (one-sentence hook)</label>',
          '<input class="adm-input" id="ef-tagline" type="text" placeholder="The sentence that made you stop." value="' + esc(p.meta.tagline || '') + '">',
        '</div>',
        '<div class="adm-field-full">',
          '<label class="adm-label" for="ef-body">Story</label>',
          '<textarea class="adm-textarea" id="ef-body" placeholder="Write or paste the story. Markdown supported.">' + esc(p.body || '') + '</textarea>',
        '</div>',
      '</div>',

      '<div class="adm-actions">',
        '<button class="adm-btn-primary" id="btn-draft">Save Draft</button>',
        pub
          ? '<button class="adm-btn-secondary" id="btn-unpub">Unpublish</button>'
          : '<button class="adm-btn-primary"   id="btn-pub">Publish →</button>',
        isNew ? '' : '<button class="adm-btn-danger" id="btn-del">Delete</button>',
      '</div>',
    ].join('');

    document.getElementById('btn-back').addEventListener('click', () => { showView('list'); renderList(); });

    if (hasPriv) {
      document.getElementById('priv-toggle').addEventListener('click', () => {
        const bd = document.getElementById('priv-bd');
        const ar = document.getElementById('priv-arrow');
        const open = bd.style.display !== 'none';
        bd.style.display = open ? 'none' : '';
        ar.classList.toggle('open', !open);
      });
    }

    document.getElementById('btn-draft').addEventListener('click', () => doSave(p, false, isNew));
    const pubBtn = document.getElementById('btn-pub') || document.getElementById('btn-unpub');
    if (pubBtn) {
      const publishing = !!document.getElementById('btn-pub');
      pubBtn.addEventListener('click', () => doSave(p, publishing, isNew));
    }
    if (!isNew) {
      document.getElementById('btn-del').addEventListener('click', () => doDel(p));
    }
  }

  function privRow(label, val) {
    if (!val) return '';
    return '<div class="adm-priv-row">'
      + '<span class="adm-priv-row__k">' + esc(label) + '</span>'
      + '<span class="adm-priv-row__v">' + esc(val) + '</span>'
      + '</div>';
  }

  // Save
  async function doSave(post, publish, isNew) {
    const meta = {
      title:    document.getElementById('ef-title').value.trim(),
      author:   document.getElementById('ef-author').value.trim(),
      date:     document.getElementById('ef-date').value.trim(),
      tagline:  document.getElementById('ef-tagline').value.trim(),
      published: publish ? 'true' : 'false',
      _private_fullname:    post.meta._private_fullname,
      _private_email:       post.meta._private_email,
      _private_contact:     post.meta._private_contact,
      _private_publishperm: post.meta._private_publishperm,
    };
    const body    = document.getElementById('ef-body').value.trim();
    const slug    = isNew ? mkSlug(meta.title) : post.filename;
    const path    = '/repos/' + S.owner + '/' + S.repo + '/contents/' + POSTS + '/' + slug;
    const payload = { message: (publish ? 'Publish: ' : 'Draft: ') + (meta.title || slug), content: b64enc(build(meta, body)) };
    if (post.sha) payload.sha = post.sha;

    setBtns(true);
    try {
      const res = await gh('PUT', path, payload);
      const updated = { filename: slug, sha: res.content.sha, meta, body };
      if (isNew) {
        S.posts.unshift(updated);
      } else {
        const i = S.posts.findIndex(p => p.filename === slug);
        if (i !== -1) S.posts[i] = updated;
      }
      toast(publish ? 'Published — site rebuilds in ~30 sec' : 'Draft saved');
      openEditor(updated);
    } catch (err) {
      toast('Save failed: ' + err.message, true);
      setBtns(false);
    }
  }

  function mkSlug(title) {
    const base = title
      ? title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60)
      : 'story-' + Date.now();
    return base + '.md';
  }

  function setBtns(off) {
    ['btn-draft','btn-pub','btn-unpub','btn-del'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = off;
    });
  }

  // Delete
  async function doDel(post) {
    if (!confirm('Delete "' + (post.meta.title || post.filename) + '"? This cannot be undone.')) return;
    setBtns(true);
    try {
      await gh('DELETE', '/repos/' + S.owner + '/' + S.repo + '/contents/' + POSTS + '/' + post.filename, {
        message: 'Delete: ' + (post.meta.title || post.filename),
        sha: post.sha,
      });
      S.posts = S.posts.filter(p => p.filename !== post.filename);
      toast('Deleted');
      showView('list');
      renderList();
    } catch (err) {
      toast('Delete failed: ' + err.message, true);
      setBtns(false);
    }
  }

  // View switcher
  function showView(v) {
    $vList.hidden = v !== 'list';
    $vEd.hidden   = v !== 'ed';
  }

  // Tabs
  document.querySelectorAll('.adm-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.adm-tab').forEach(x => x.classList.remove('is-active'));
      t.classList.add('is-active');
      S.filter = t.dataset.f;
      renderList();
    });
  });

  document.getElementById('btn-new').addEventListener('click', () => openEditor(null));

  // Login
  ['in-owner','in-repo','in-token'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  });

  document.getElementById('btn-login').addEventListener('click', async () => {
    const owner = document.getElementById('in-owner').value.trim();
    const repo  = document.getElementById('in-repo').value.trim();
    const token = document.getElementById('in-token').value.trim();
    const errEl = document.getElementById('login-err');
    const btn   = document.getElementById('btn-login');
    errEl.hidden = true;
    if (!owner || !repo || !token) { errEl.textContent = 'All three fields are required.'; errEl.hidden = false; return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const r = await fetch('https://api.github.com/user', {
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' },
      });
      if (!r.ok) throw new Error('Invalid token or insufficient permissions');
      S.token = token; S.owner = owner; S.repo = repo;
      localStorage.setItem('adm_t', token);
      localStorage.setItem('adm_o', owner);
      localStorage.setItem('adm_r', repo);
      showApp();
    } catch (err) {
      errEl.textContent = 'Sign-in failed: ' + err.message;
      errEl.hidden = false;
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  });

  $logout.addEventListener('click', () => {
    ['adm_t','adm_o','adm_r'].forEach(k => localStorage.removeItem(k));
    Object.assign(S, { token: null, owner: null, repo: null, posts: [] });
    $login.hidden = false; $app.hidden = true; $logout.hidden = true;
  });

  function showApp() {
    $login.hidden = true; $app.hidden = false; $logout.hidden = false;
    showView('list');
    loadPosts();
  }

  // Auto-login from localStorage
  (function () {
    const t = localStorage.getItem('adm_t');
    const o = localStorage.getItem('adm_o');
    const r = localStorage.getItem('adm_r');
    if (t && o && r) {
      S.token = t; S.owner = o; S.repo = r;
      document.getElementById('in-owner').value = o;
      document.getElementById('in-repo').value  = r;
      showApp();
    }
  })();
  </script>

</body>
</html>
